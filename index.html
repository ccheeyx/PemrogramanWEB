<!DOCTYPE html>
<html>
<head>
    <title>Form Login</title>
    <style>
        body {
            font-family: Poppins, sans-serif;
            background-color: #7f707f;
        }

        .container {
            width: 400px;
            margin: 200px auto;
            padding: 50px;
            background-color: #ccbfce;
            border-radius: 10px;
            box-shadow: 3px 3px 3px 3px rgba(0.1,0.1,0.1,0.1);
        }

        h2 {
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
        }

        button {
            width: 105%;
            padding: 10px;
            background-color: #a55aa4;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #733f6f;
        }

        .link {
            text-align: center;
            margin-top: 20px;
        }

        .link a {
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <form>
        <div class="form-group">
            <label>Username</label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" required>
        </div>

        <button type="submit">Login</button>

        <div class="link">
            Belum punya akun? <a href="registrasi.html">Daftar di sini</a>
        </div>
    </form>
</div>

</body>
</html>
